        .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.6) translateY(50px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

            if (type === 'click') { osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }

            else if (type === 'error') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
            else if (type === 'pop') { osc.type = 'sine'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05); osc.start(); osc.stop(audioCtx.currentTime + 0.05); }

        function renderNota() {

                for(let k in KATEGORI) html += `<button onclick="bukaNota('${k}')" class="bg-gradient-to-br ${KATEGORI[k].warna} p-6 rounded-[2rem] border-4 border-white btn-3d card-wow flex flex-col items-center justify-center group text-center"><span class="text-6xl mb-4 float-slow group-hover:scale-125 transition-transform bg-white/20 p-4 rounded-full shadow-inner">${KATEGORI[k].ikon}</span><h3 class="text-2xl font-bold text-white drop-shadow-md">${KATEGORI[k].nama}</h3></button>`;

                isi = `<div class="text-center pop-in"><h3 class="text-4xl font-bold mb-10 text-slate-800">5 Contoh Tepat! 🔍</h3><div class="grid grid-cols-2 sm:grid-cols-3 gap-6 max-w-4xl mx-auto">${list}</div></div>`;
            } else if(state.notaTab === 3) {
                let list = data.nota.ayat.map((a,i) => `<div class="bg-white p-6 rounded-2xl border-l-8 border-[${data.warna.split(' ')[1].replace('to-','')}] shadow-md mb-4 text-left font-bold text-xl text-slate-700 flex items-center gap-4"><div class="bg-slate-100 w-12 h-12 flex items-center justify-center rounded-full text-slate-400 shrink-0">${i+1}</div> <div>${a}</div></div>`).join('');
                isi = `<div class="pop-in max-w-4xl mx-auto w-full"><h3 class="text-4xl font-bold mb-8 text-center text-slate-800">5 Contoh Ayat Sempurna 🧠</h3>${list}</div>`;
            }
            return `<div class="bg-white rounded-[3rem] p-8 shadow-2xl border-8 border-slate-100 pop-in min-h-[75vh] flex flex-col relative card-wow"><button onclick="setView('nota'); state.notaKey=null;" class="absolute top-6 left-6 bg-slate-100 text-slate-500 hover:text-slate-700 w-12 h-12 rounded-full font-bold text-xl flex items-center justify-center btn-3d">⬅</button><div class="flex flex-wrap justify-center gap-4 mb-12 mt-12 bg-slate-100 p-2 rounded-full w-fit mx-auto border-4 border-slate-200"><button onclick="tabNota(1)" class="px-8 py-3 rounded-full font-bold text-xl transition-all ${state.notaTab===1 ? 'bg-white shadow text-blue-600 btn-3d' : 'text-slate-500'}">Definisi</button><button onclick="tabNota(2)" class="px-8 py-3 rounded-full font-bold text-xl transition-all ${state.notaTab===2 ? 'bg-white shadow text-pink-600 btn-3d' : 'text-slate-500'}">5 Contoh Perkataan</button><button onclick="tabNota(3)" class="px-8 py-3 rounded-full font-bold text-xl transition-all ${state.notaTab===3 ? 'bg-white shadow text-emerald-600 btn-3d' : 'text-slate-500'}">5 Contoh Ayat</button></div><div class="flex-grow flex items-center justify-center w-full">${isi}</div></div>`;
        }

        // ==========================================
        // GUA LATIHAN
        // ==========================================
        window.mulaLatihan = function(k) { playSound('success'); state.latihanKey = k; state.latihanSoalan = KATEGORI[k].latihan; state.latihanIndex = 0; state.latihanMarkah = 0; state.latihanTamat = false; renderApp(); }
        window.jawabLatihan = function(jawab) {
            const soalan = state.latihanSoalan[state.latihanIndex];
            const betul = jawab === soalan[1]; cetusPopup(betul);
            if(betul) { state.latihanMarkah++; }
            setTimeout(() => {
                if(state.latihanIndex + 1 < state.latihanSoalan.length) { state.latihanIndex++; } 
                else { state.latihanTamat = true; tambahBintang(state.latihanMarkah * 2); }
                renderApp();
            }, 1200);
        }

        function renderLatihan() {
            if(!state.latihanKey) {
                let html = '';
                for(let k in KATEGORI) html += `<button onclick="mulaLatihan('${k}')" class="bg-white p-6 rounded-[2rem] border-4 border-slate-200 hover:border-blue-500 btn-3d card-wow flex flex-col items-center group"><span class="text-6xl mb-4 bg-slate-100 p-4 rounded-full group-hover:scale-110 transition-transform">${KATEGORI[k].ikon}</span><h3 class="text-2xl font-bold text-slate-700">${KATEGORI[k].nama}</h3></button>`;
                return `<div class="pop-in"><h2 class="text-4xl font-bold text-white text-center mb-8 drop-shadow-lg">Pilih Pintu Gua (10 Soalan)</h2><div class="grid grid-cols-2 md:grid-cols-3 gap-6">${html}</div></div>`;
            }
            if(state.latihanTamat) return `<div class="bg-white p-12 rounded-[3rem] text-center max-w-2xl mx-auto pop-in shadow-2xl border-8 border-emerald-400 card-wow mt-10"><div class="text-9xl mb-6 float-slow">🏆</div><h2 class="text-5xl font-bold text-slate-800 mb-4">Latihan Tamat!</h2><p class="text-3xl font-bold text-slate-500 mb-6">Markah anda:</p><div class="text-7xl font-bold text-emerald-500 mb-8">${state.latihanMarkah} / 10</div><p class="text-2xl font-bold text-amber-500 mb-10">+${state.latihanMarkah * 2} Bintang Ditambah! ⭐</p><button onclick="setView('latihan'); state.latihanKey=null;" class="bg-emerald-500 text-white px-12 py-5 rounded-full font-bold text-2xl btn-3d">Kembali Keluar</button></div>`;
            const qs = state.latihanSoalan[state.latihanIndex];
            const pilihan = [qs[1], qs[2], qs[3], qs[4]].sort(()=>Math.random()-0.5);
            let pBtn = pilihan.map(p => `<button onclick="jawabLatihan('${p}')" class="bg-white text-slate-700 border-4 border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-2xl font-bold p-8 rounded-3xl btn-3d transition-colors text-left">${p}</button>`).join('');
            return `
            <div class="bg-white p-10 rounded-[3rem] max-w-4xl mx-auto shadow-2xl border-8 border-slate-100 pop-in card-wow mt-4 relative">
                <button onclick="mintaKeluar('latihan')" class="absolute top-6 right-6 text-white bg-rose-500 hover:bg-rose-600 w-12 h-12 rounded-full font-bold btn-3d text-xl z-50 flex items-center justify-center border-2 border-white">❌</button>
                <div class="flex justify-center md:justify-start items-center mb-10 bg-slate-100 p-4 rounded-2xl border-4 border-slate-200 gap-6 w-max">
                    <span class="text-2xl font-bold text-slate-500">Soalan ${state.latihanIndex + 1} / 10</span>
                    <span class="text-2xl font-bold text-amber-500 bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200"><i class="fa-solid fa-star"></i> Skor: ${state.latihanMarkah}</span>
                </div>
                <h3 class="text-4xl font-bold text-slate-800 mb-10 leading-snug text-center">${qs[0].replace('____', '<span class="border-b-4 border-dashed border-blue-500 text-blue-500">______</span>')}</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">${pBtn}</div>
            </div>`;
        }

        // ========================================================
        // ARKED INTERAKTIF: PHYSICS ENGINE SEBENAR (Mario / Circus)
        // ========================================================
        window.bukaGame = function(g) {
            playSound('pop'); state.gamePilih = g; 
            state.gameIndex = 0; state.gameScore = 0; state.gameLives = 3; state.gameTamat = false; 
            state.gamePhase = 'lari';
            
            // Setup Timer
            state.gameMasaKini = 0;
            if(state.gameTimerInterval) clearInterval(state.gameTimerInterval);
            state.gameTimerInterval = setInterval(() => {
                if(state.gamePhase !== 'soalan' && !state.gameTamat && !state.showPopup && !state.exitConfirm.show) {
                    state.gameMasaKini++;
                    const el = document.getElementById('gameTimerDisplay');
                    if(el) el.innerText = formatMasa(state.gameMasaKini);
                }
            }, 1000);

            if(g === 'susun') {
                state.susunAyat = [...DATA_BINA_AYAT[0]].sort(()=>Math.random()-0.5); state.susunJawab = [];
            } else if (g === 'mario' || g === 'circus') {
                state.soalanRawak = [...(g === 'mario' ? DATA_GAME_MARIO : DATA_GAME_CIRCUS)].sort(()=>Math.random()-0.5);
                state.gameEngineState = {
                    keys: { left: false, right: false, up: false },
                    player: { x: 100, y: 0, vx: 0, vy: 0, isJumping: false },
                    cameraX: 0,
                    obstacles: Array.from({length: 10}, (_, i) => ({ x: 600 + (i*800), active: true, qIndex: i })),
                    animId: null
                };
                startGameEngine();
            }
            renderApp();
        }

        window.startGameEngine = function() {
            if(state.gameEngineState.animId) cancelAnimationFrame(state.gameEngineState.animId);
            
            window.removeEventListener('keydown', handleKD); window.removeEventListener('keyup', handleKU);
            window.addEventListener('keydown', handleKD); window.addEventListener('keyup', handleKU);
            
            function loop() {
                if(state.view !== 'permainan' || (state.gamePilih !== 'mario' && state.gamePilih !== 'circus')) {
                    window.removeEventListener('keydown', handleKD); window.removeEventListener('keyup', handleKU);
                    return; 
                }
                
                if(state.gamePhase === 'lari' && !state.showPopup && !state.exitConfirm.show && !state.gameTamat) {
                    let p = state.gameEngineState.player; let k = state.gameEngineState.keys;
                    
                    // Fizik: Graviti dan Pergerakan X
                    p.y += p.vy; p.vy -= 1.5; 
                    if(p.y <= 0) { p.y = 0; p.vy = 0; p.isJumping = false; }
                    
                    if(k.right) p.vx = 8; else if(k.left) p.vx = -8; else p.vx = 0;
                    if(p.x + p.vx < 0) p.vx = 0; // Halangundur tak terhingga
                    p.x += p.vx;
                    
                    // Kamera mengekori pemain
                    state.gameEngineState.cameraX = p.x - 150;
                    if(state.gameEngineState.cameraX < 0) state.gameEngineState.cameraX = 0;
                    
                    // Pelanggaran Checkpoint (Soalan)
                    for(let i=0; i<state.gameEngineState.obstacles.length; i++) {
                        let obs = state.gameEngineState.obstacles[i];
                        if(obs.active && p.x >= obs.x) {
                            obs.active = false; 
                            k.right = false; k.left = false; k.up = false; p.vx = 0; // Pause physics
                            triggerSoalan(obs.qIndex);
                            break;
                        }
                    }
                    
                    // Update DOM (Smooth 60fps)
                    const pEl = document.getElementById('game-player');
                    const wEl = document.getElementById('game-world');
                    const bgEl = document.getElementById('game-bg');
                    
                    if(pEl) pEl.style.transform = "translate(" + p.x + "px, " + (-p.y) + "px)";
                    if(wEl) wEl.style.transform = "translateX(" + (-state.gameEngineState.cameraX) + "px)";
                    if(bgEl) bgEl.style.backgroundPosition = (-state.gameEngineState.cameraX * 0.5) + "px 0";
                    
                    state.gameEngineState.obstacles.forEach((o, i) => {
                        const oEl = document.getElementById('obs-' + i);
                        if(oEl && !o.active && oEl.style.opacity !== '0') {
                            oEl.style.opacity = '0'; oEl.style.transform = 'translateY(-50px) scale(1.5)';
                        }
                    });
                }
                state.gameEngineState.animId = requestAnimationFrame(loop);
            }
            state.gameEngineState.animId = requestAnimationFrame(loop);
        }

        function handleKD(e) {
            if(state.gamePhase !== 'lari' || state.exitConfirm.show || state.showPopup) return;
            if(e.key === 'ArrowRight') state.gameEngineState.keys.right = true;
            if(e.key === 'ArrowLeft') state.gameEngineState.keys.left = true;
            if(e.key === 'ArrowUp' || e.key === ' ') loncatTekan();
        }
        function handleKU(e) {
            if(e.key === 'ArrowRight') state.gameEngineState.keys.right = false;
            if(e.key === 'ArrowLeft') state.gameEngineState.keys.left = false;
        }
        window.loncatTekan = function() {
            if(state.gamePhase === 'lari' && !state.gameEngineState.player.isJumping) {
                state.gameEngineState.player.vy = 22; state.gameEngineState.player.isJumping = true; playSound('pop');
            }
        }

        function triggerSoalan(index) {
            state.gamePhase = 'soalan';
            state.gameIndex = index;
            renderApp();
        }

        window.jawabGame = function(jawapan) {
            if(state.gameTamat) return;
            let qs = state.soalanRawak[state.gameIndex];
            let betul = (jawapan === qs[1]);
            
            cetusPopup(betul);
            if(betul) { playSound('success'); state.gameScore++; } 
            else { playSound('error'); state.gameLives--; }

            setTimeout(() => {
                if(state.gameLives <= 0 || state.gameIndex + 1 >= 10) {
                    state.gameTamat = true; tambahBintang(state.gameScore * 2);
                    if(state.gameTimerInterval) clearInterval(state.gameTimerInterval);
                } else {
                    state.gamePhase = 'lari';
                }
                renderApp();
            }, 1200);
        }

        window.klikSusun = function(perkataan, i) { playSound('click'); state.susunJawab.push(perkataan); state.susunAyat[i] = null; renderApp(); }
        window.semakSusun = function() {
            const asal = DATA_BINA_AYAT[state.gameIndex].join(' '); const jawab = state.susunJawab.join(' '); const betul = asal === jawab;
            cetusPopup(betul);
            setTimeout(() => {
                if(betul) {
                    state.gameScore++;
                    if(state.gameIndex + 1 < 10) { state.gameIndex++; state.susunAyat = [...DATA_BINA_AYAT[state.gameIndex]].sort(()=>Math.random()-0.5); state.susunJawab = []; } 
                    else { state.gameTamat = true; tambahBintang(state.gameScore * 3); if(state.gameTimerInterval) clearInterval(state.gameTimerInterval); }
                } else {
                    state.gameLives--;
                    if(state.gameLives <= 0) { state.gameTamat = true; tambahBintang(state.gameScore * 3); if(state.gameTimerInterval) clearInterval(state.gameTimerInterval); }
                    else { state.susunAyat = state.susunJawab.filter(x=>x).concat(state.susunAyat.filter(x=>x)).sort(()=>Math.random()-0.5); state.susunJawab = []; }
                }
                renderApp();
            }, 1200);
        }

        function renderPermainan() {
            if(state.gameTamat) return `<div class="bg-white p-12 text-center max-w-2xl mx-auto rounded-[3rem] border-8 border-blue-400 pop-in mt-10 card-wow"><div class="text-8xl mb-6">🏁</div><h2 class="text-5xl font-bold mb-4 text-slate-800">Permainan Tamat!</h2><p class="text-2xl font-bold text-slate-500 mb-2">Masa Keseluruhan: <span class="text-blue-500">${formatMasa(state.gameMasaKini)}</span></p><p class="text-3xl font-bold text-slate-500 mb-6">Markah: ${state.gameScore}/10</p><p class="text-2xl font-bold text-blue-500 mb-10">Bintang diperoleh: +${state.gamePilih==='susun'? state.gameScore*3 : state.gameScore*2} ⭐</p><button onclick="sahKeluar()" class="bg-blue-500 text-white px-10 py-5 font-bold text-2xl rounded-full btn-3d">Kembali Keluar</button></div>`;

            if(state.gamePilih === 'susun') {
                let kotak = state.susunJawab.map(s => `<div class="bg-white px-6 py-4 rounded-2xl text-3xl font-bold text-emerald-700 card-wow border-4 border-emerald-200 pop-in">${s}</div>`).join('');
                let butang = state.susunAyat.map((p,i) => p ? `<button onclick="klikSusun('${p}', ${i})" class="bg-amber-400 text-amber-900 px-8 py-4 text-3xl font-bold rounded-2xl btn-3d border-4 border-white mx-2">${p}</button>` : `<div class="w-32 mx-2"></div>`).join('');
                return `<div class="bg-gradient-to-b from-emerald-400 to-teal-500 p-10 rounded-[3rem] min-h-[70vh] flex flex-col items-center justify-center pop-in card-wow border-8 border-white relative mt-4">
                    <button onclick="mintaKeluar('game')" class="absolute top-6 right-6 text-white bg-rose-500 hover:bg-rose-600 w-12 h-12 rounded-full font-bold btn-3d text-xl z-50 flex items-center justify-center border-2 border-white">❌</button>
                    <div class="absolute top-6 left-6 text-white font-bold text-2xl bg-black/20 px-6 py-2 rounded-full flex flex-col items-start md:flex-row md:items-center gap-2 md:gap-4 z-50">
                        <span class="flex items-center gap-2"><i class="fa-regular fa-clock"></i> <span id="gameTimerDisplay">${formatMasa(state.gameMasaKini)}</span></span>
                        <span>❤️ ${state.gameLives}</span>
                        <span>Soalan ${state.gameIndex+1}/10</span>
                    </div>
                    <h2 class="text-5xl font-bold text-white mb-12 drop-shadow-md">🧩 Bina Ayat</h2><div class="w-full max-w-4xl bg-black/10 min-h-[120px] rounded-3xl border-4 border-dashed border-white/50 mb-12 flex items-center justify-center flex-wrap gap-4 p-6">${kotak || '<p class="text-emerald-800/50 font-bold text-2xl">Klik blok di bawah...</p>'}</div><div class="flex justify-center flex-wrap gap-4">${butang}</div>${state.susunJawab.length === DATA_BINA_AYAT[state.gameIndex].length ? `<button onclick="semakSusun()" class="mt-12 bg-white text-emerald-600 px-12 py-5 rounded-full text-3xl font-bold btn-3d border-4 border-emerald-200 pop-in">Semak!</button>`:''}</div>`;
            } 
            else if (state.gamePilih === 'mario' || state.gamePilih === 'circus') {
                const isMario = state.gamePilih === 'mario';
                const bgClass = isMario ? 'bg-cyan-300' : 'bg-purple-900';
                const groundClass = isMario ? 'bg-green-500 border-green-700' : 'bg-red-600 border-red-800';
                const heroIcon = isMario ? '🏃‍♂️' : '🦁'; const boxIcon = isMario ? '📦' : '🎈';

                let bgPos = -state.gameEngineState.cameraX * 0.5;
                let qs = state.soalanRawak[state.gameIndex];
                let pilihanHtml = '';
                if(state.gamePhase === 'soalan') {
                    const pilihan = [qs[1], qs[2], qs[3], qs[4]].sort(()=>Math.random()-0.5);
                    pilihanHtml = `<div class="absolute inset-0 bg-black/80 z-40 flex flex-col items-center justify-center p-6 pop-in">
                        <h3 class="text-3xl font-bold text-white mb-8 text-center drop-shadow-md max-w-2xl leading-relaxed">${qs[0].replace('____', '______')}</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl">
                            ${pilihan.map(p => `<button onclick="jawabGame('${p}')" class="bg-white text-xl md:text-2xl font-bold p-6 rounded-xl btn-3d text-slate-800 hover:bg-amber-100 border-4 border-slate-200">${p}</button>`).join('')}
                        </div>
                    </div>`;
                }

                return `
                <div class="bg-slate-800 p-8 rounded-[3rem] min-h-[70vh] flex flex-col items-center pop-in card-wow border-8 border-white relative mt-4">
                    <button onclick="mintaKeluar('game')" class="absolute top-6 right-6 text-white bg-rose-500 hover:bg-rose-600 w-12 h-12 rounded-full font-bold btn-3d text-xl z-[60] flex items-center justify-center border-2 border-white">❌</button>
                    <div class="flex flex-col md:flex-row justify-start w-full mb-4 text-white font-bold text-2xl z-20 gap-2 items-start">
                        <span class="bg-black/30 px-4 py-2 rounded-full flex items-center gap-3"><i class="fa-regular fa-clock"></i> <span id="gameTimerDisplay">${formatMasa(state.gameMasaKini)}</span></span>
                        <div class="flex gap-4 bg-black/30 px-4 py-2 rounded-full"><span>Nyawa: ${'❤️'.repeat(state.gameLives)}</span> <span>| Soalan: ${state.gameIndex+1}/10</span></div>
                    </div>

                    <div id="game-bg" class="relative w-full h-[400px] ${bgClass} rounded-3xl border-4 border-slate-300 overflow-hidden shadow-inner mb-6" style="background-image: repeating-linear-gradient(90deg, transparent, transparent 100px, rgba(255,255,255,0.2) 100px, rgba(255,255,255,0.2) 200px); background-size: 200px 100%; background-position: ${bgPos}px 0;">
                        <div class="absolute bottom-0 w-full h-12 ${groundClass} border-t-8 z-30"></div>
                        <div id="game-world" class="absolute inset-0 z-10" style="transform: translateX(${-state.gameEngineState.cameraX}px);">
                            <div id="game-player" class="absolute z-20 text-7xl origin-bottom" style="bottom: 48px; left: 0px; transform: translate(${state.gameEngineState.player.x}px, ${-state.gameEngineState.player.y}px);">${heroIcon}</div>
                            ${state.gameEngineState.obstacles.map((obs, i) => `<div id="obs-${i}" class="absolute z-10 text-6xl transition-all duration-300" style="bottom: 48px; left: ${obs.x}px; opacity: ${obs.active ? '1' : '0'};">${boxIcon}</div>`).join('')}
                        </div>
                        ${pilihanHtml}
                    </div>
                    
                    ${state.gamePhase === 'lari' && !state.gameTamat ? `
                    <div class="text-slate-400 font-bold mb-2 hidden md:block">Gunakan kekunci ⬅️ ➡️ untuk bergerak dan ⬆️ untuk melompat. Sentuh kotak misteri!</div>
                    <div class="flex justify-between items-center w-full max-w-lg px-4 hide-on-desktop">
                        <div class="flex gap-4">
                            <button onmousedown="state.gameEngineState.keys.left=true" onmouseup="state.gameEngineState.keys.left=false" ontouchstart="state.gameEngineState.keys.left=true; event.preventDefault();" ontouchend="state.gameEngineState.keys.left=false; event.preventDefault();" class="w-16 h-16 bg-slate-600 text-white rounded-full text-3xl btn-3d shadow flex items-center justify-center">⬅️</button>
                            <button onmousedown="state.gameEngineState.keys.right=true" onmouseup="state.gameEngineState.keys.right=false" ontouchstart="state.gameEngineState.keys.right=true; event.preventDefault();" ontouchend="state.gameEngineState.keys.right=false; event.preventDefault();" class="w-16 h-16 bg-slate-600 text-white rounded-full text-3xl btn-3d shadow flex items-center justify-center">➡️</button>
                        </div>
                        <button onmousedown="loncatTekan()" ontouchstart="loncatTekan(); event.preventDefault();" class="w-20 h-20 bg-amber-400 text-amber-900 rounded-full text-4xl btn-3d shadow-xl border-4 border-white flex items-center justify-center font-bold">⬆️</button>
                    </div>
                    ` : ''}
                </div>`;
            }

            return `<div class="pop-in mt-4"><div class="bg-slate-800 text-white rounded-[2rem] p-10 shadow-2xl mb-10 flex items-center justify-between overflow-hidden relative border-8 border-slate-700"><div class="relative z-10"><h2 class="text-5xl font-bold mb-4 text-amber-400 drop-shadow-md">Taman Arked 🎮</h2><p class="text-2xl font-bold text-slate-300">Permainan animasi bergerak! Pilih misi anda!</p></div><div class="text-9xl absolute right-10 opacity-30 float">🕹️</div></div><div class="grid grid-cols-1 md:grid-cols-3 gap-8"><button onclick="bukaGame('susun')" class="bg-gradient-to-br from-emerald-400 to-teal-500 p-10 rounded-[3rem] border-8 border-white btn-3d card-wow flex flex-col items-center group"><div class="text-8xl mb-6 float-slow bg-white/20 p-6 rounded-full group-hover:scale-110 transition-transform shadow-inner">🧩</div><h3 class="text-3xl font-bold text-white drop-shadow-md mb-2">Bina Ayat</h3></button><button onclick="bukaGame('mario')" class="bg-gradient-to-br from-blue-400 to-indigo-500 p-10 rounded-[3rem] border-8 border-white btn-3d card-wow flex flex-col items-center group"><div class="text-8xl mb-6 float-slow bg-white/20 p-6 rounded-full group-hover:scale-110 transition-transform shadow-inner">🏃‍♂️</div><h3 class="text-3xl font-bold text-white drop-shadow-md mb-2">Larian Mario</h3></button><button onclick="bukaGame('circus')" class="bg-gradient-to-br from-rose-400 to-red-500 p-10 rounded-[3rem] border-8 border-white btn-3d card-wow flex flex-col items-center group"><div class="text-8xl mb-6 float-slow bg-white/20 p-6 rounded-full group-hover:scale-110 transition-transform shadow-inner">🎪</div><h3 class="text-3xl font-bold text-white drop-shadow-md mb-2">Sarkas Hebat</h3></button></div></div>`;
        }

        // =====================================
        // PANEL ADMIN
        // =====================================
        function fetchAdmin() {
            state.adminLoading = true; renderApp();
            fetch(SCRIPT_URL + "?t=" + new Date().getTime()).then(r=>r.json()).then(d => { state.adminData = d; state.adminLoading = false; renderApp(); }).catch(e => { state.adminLoading = false; console.log("Gagal ambil data"); renderApp(); });
        }
        window.bukaModalEdit = function(topik, idx, asal) {
            playSound('click');
            const html = `
            <div id="modal-edit" class="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4">
                <div class="bg-white p-8 rounded-[2rem] w-full max-w-lg pop-in border-8 border-blue-400">
                    <h3 class="text-2xl font-bold mb-4 text-slate-800">Edit Soalan</h3>
                    <p class="text-slate-500 mb-2 font-bold bg-slate-100 px-4 py-2 rounded-lg">Topik: ${topik}</p>
                    <textarea id="editTeks" class="w-full border-4 border-slate-200 rounded-xl p-4 text-lg font-bold mb-6 h-32 focus:border-blue-400 outline-none">${asal}</textarea>
                    <div class="flex gap-4 justify-end">
                        <button onclick="document.getElementById('modal-edit').remove();" class="px-6 py-3 bg-slate-200 font-bold rounded-xl btn-3d">Batal</button>
                        <button onclick="simpanEdit('${topik}', ${idx})" class="px-6 py-3 bg-blue-600 text-white font-bold rounded-xl btn-3d">Simpan ke Google Sheet</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', html);
        }
        window.simpanEdit = function(topik, index) {
            const txt = document.getElementById('editTeks').value;
            if(txt) {
                fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'edit_soalan', topik: topik, index: index, soalan: txt, jawapan: 'Betul', salah1:'Salah1', salah2:'Salah2', salah3:'Salah3' }) });
                document.getElementById('modal-edit').remove();
                cetusPopup(true);
            }
        }

        function renderAdmin() {
            if(state.adminLoading) return `<div class="text-center py-20 text-3xl font-bold text-white">Memuatkan Pangkalan Data... 🚀</div>`;
            const rekod = state.adminData.rekod || JSON.parse(localStorage.getItem('bka_rekod') || '[]'); const soalan = state.adminData.soalan_edit || [];
            let e = 0, p = 0, g = 0; rekod.forEach(r => { if(r.anugerah==='Emas')e++; else if(r.anugerah==='Perak')p++; else if(r.anugerah==='Gangsa')g++; }); const total = Math.max(e+p+g, 1);
            let htmlSoalan = '';
            for(let key in KATEGORI) {
                htmlSoalan += `<h3 class="font-bold text-xl text-emerald-400 mt-4 mb-2">${KATEGORI[key].nama}</h3>`;
                KATEGORI[key].latihan.forEach((q, idx) => {
                    let textDipapar = q[0]; let editJumpa = soalan.find(s => s.topik === key && parseInt(s.index) === idx);
                    if(editJumpa) textDipapar = editJumpa.soalan;
                    htmlSoalan += `<div class="bg-slate-700 p-3 rounded-xl mb-2 flex justify-between items-center text-sm"><div class="font-bold text-white w-3/4">${idx+1}. ${textDipapar}</div><button onclick="bukaModalEdit('${key}', ${idx}, '${textDipapar.replace(/'/g, "\\'")}')" class="bg-blue-500 px-4 py-2 rounded-lg font-bold text-white btn-3d text-xs">Edit</button></div>`;
                });
            }
            return `<div class="pop-in grid grid-cols-1 md:grid-cols-2 gap-6"><div class="bg-white rounded-[2rem] p-8 shadow-xl border-4 border-slate-100 card-wow text-center"><h2 class="text-2xl font-bold text-slate-800 mb-6 border-b-2 pb-4">📊 Analisis Anugerah</h2><div class="flex items-end justify-around h-48 bar-chart-bg p-4 rounded-xl border border-slate-200"><div class="w-12 bg-yellow-400 rounded-t-lg relative" style="height: ${(e/total)*100}%"><span class="absolute -top-6 w-full text-center font-bold text-yellow-600">${e}</span></div><div class="w-12 bg-slate-400 rounded-t-lg relative" style="height: ${(p/total)*100}%"><span class="absolute -top-6 w-full text-center font-bold text-slate-600">${p}</span></div><div class="w-12 bg-orange-400 rounded-t-lg relative" style="height: ${(g/total)*100}%"><span class="absolute -top-6 w-full text-center font-bold text-orange-600">${g}</span></div></div><div class="flex justify-around mt-4 font-bold text-slate-500 text-sm"><span>Emas</span><span>Perak</span><span>Gangsa</span></div></div><div class="bg-white rounded-[2rem] p-8 shadow-xl border-4 border-slate-100 card-wow"><h2 class="text-2xl font-bold text-slate-800 mb-6 border-b-2 pb-4">🏆 Status Terkini</h2><div class="max-h-48 overflow-y-auto">${rekod.slice(0,5).map((r,i) => `<div class="flex justify-between items-center bg-slate-50 p-3 mb-2 rounded-xl border border-slate-200"><b>#${i+1} ${r.nama}</b><span class="text-amber-500 font-bold">${r.anugerah}</span></div>`).join('')}</div></div><div class="md:col-span-2 bg-slate-800 text-white rounded-[2rem] p-8 shadow-xl border-4 border-slate-700 card-wow"><h2 class="text-2xl font-bold text-amber-400 mb-6">⚙️ Edit 90 Soalan Latihan</h2><div class="max-h-96 overflow-y-auto pr-4">${htmlSoalan}</div></div></div>`;
        }

        function renderRekod() {
            let rekod = state.adminData.rekod || JSON.parse(localStorage.getItem('bka_rekod') || '[]'); rekod.sort((a, b) => b.bintang - a.bintang);
            let baris = rekod.map((r, i) => `<tr class="border-b-4 border-slate-100 hover:bg-amber-50 transition-colors ${i===0?'bg-amber-100 text-amber-900':''}"><td class="p-6 text-center font-bold text-3xl">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td><td class="p-6 font-bold text-2xl text-slate-800">${r.nama}</td><td class="p-6 text-xl text-slate-500 hidden md:table-cell font-bold">${r.sekolah}</td><td class="p-6 text-center font-bold text-lg text-slate-600">${r.anugerah}</td><td class="p-6 text-right font-bold text-3xl ${i===0?'text-amber-600':'text-amber-500'}">${r.bintang} ⭐</td></tr>`).join('') || `<tr><td colspan="5" class="p-10 text-center text-slate-400 font-bold text-2xl">Belum ada pejuang mendaftar!</td></tr>`;
            return `<div class="pop-in max-w-5xl mx-auto mt-4 pb-10"><div class="bg-gradient-to-r from-amber-400 to-orange-500 p-8 rounded-t-[3rem] text-white text-center border-8 border-white border-b-0 card-wow"><div class="text-7xl mb-4 float-slow drop-shadow-md">🏆</div><h2 class="text-5xl font-bold tracking-wide">CARTA JUARA</h2></div><div class="bg-white p-8 rounded-b-[3rem] shadow-2xl border-8 border-white border-t-0 card-wow"><div class="overflow-hidden rounded-[2rem] border-4 border-slate-200"><table class="w-full text-left"><thead class="bg-slate-800 text-white text-xl"><tr><th class="p-6 font-bold text-center">Ked.</th><th class="p-6 font-bold">Nama Pahlawan</th><th class="p-6 font-bold hidden md:table-cell">Sekolah</th><th class="p-6 font-bold text-center">Anugerah</th><th class="p-6 font-bold text-right">Bintang</th></tr></thead><tbody>${baris}</tbody></table></div></div></div>`;
        }

        function renderPopUp() {
            if(!state.showPopup) return ''; const isBetul = state.popupType === 'betul';
            return `<div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm"><div class="bg-white p-12 rounded-[3rem] text-center border-8 ${isBetul ? 'border-emerald-500' : 'border-red-500'} pop-in transform scale-125"><div class="text-9xl mb-4 float-fast">${isBetul ? '🎉' : '💥'}</div><h2 class="text-5xl font-bold ${isBetul ? 'text-emerald-600' : 'text-red-600'}">${state.popupMsg}</h2></div></div>`;
        }

        function renderApp() {
            let app = document.getElementById('app'); if (!app) return;
            let html = '';
            if (!state.user || state.view === 'login') html = renderLogin();
            else { html += renderHeader(); html += '<main class="flex-grow w-full max-w-6xl mx-auto p-4 md:p-6 mt-4 relative z-10">'; if (state.view === 'dashboard') html += renderDashboard(); else if (state.view === 'admin') html += renderAdmin(); else if (state.view === 'nota') html += renderNota(); else if (state.view === 'latihan') html += renderLatihan(); else if (state.view === 'permainan') html += renderPermainan(); else if (state.view === 'rekod') html += renderRekod(); else if (state.view === 'sijil') html += renderSijil(); html += '</main>'; html += `<footer class="text-center py-6 text-white font-bold hide-on-print opacity-80 mt-auto">Dibangunkan oleh CikguAmirul@2026</footer>`; }
            app.innerHTML = html;
            let popupDiv = document.getElementById('global-popup'); if(!popupDiv) { popupDiv = document.createElement('div'); popupDiv.id = 'global-popup'; document.body.appendChild(popupDiv); } popupDiv.innerHTML = renderPopUp() + renderExitConfirm();
        }
        renderApp();
    </script>
</body>
</html>
